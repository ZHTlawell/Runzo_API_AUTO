# ============================================================
# 基础配置（所有环境共享）
# ============================================================
# 各环境的配置文件（test.yaml / staging.yaml）会覆盖此文件中的同名配置。
# 覆盖规则：
#   - 简单值（字符串/数字）: 环境配置直接替换 base 值
#   - 字典类型: 深度合并（环境配置的 key 覆盖 base 的同名 key，其余保留）
#   - 列表类型: 环境配置直接替换（不做合并）
#
# 使用方式:
#   最终配置 = deep_merge(base.yaml, {env}.yaml)
# ============================================================

# HTTP 请求超时时间（秒）
timeout: 30

# MongoDB 数据库名（所有环境共用同一个库名）
mongodb:
  db_name: "echo"

# 公共请求头默认值（所有环境一致）
default_headers:
  ts-time-zone-id: "Asia/Shanghai"
  ts-country: "CN"
  ts-run-unit: "km"
  lang: "en"

# 日志级别
log_level: "INFO"

# 设备登录默认参数
auth:
  app_name: "RunnerAI"
