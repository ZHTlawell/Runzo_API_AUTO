# ============================================================
# 训练计划生成 - 测试数据
# ============================================================
# 用于 POST /runzo/plan/generate 接口的参数化测试数据
#
# GeneratePlanDTO 字段说明:
#   - gender: 性别 (0=女, 1=男)
#   - heightValue/heightUnit: 身高 (cm/inch)
#   - weightValue/weightUnit: 体重 (kg/lb)
#   - trainingGoal: 训练目标 (5km/10km/half_marathon/full_marathon/custom)
#   - planCompletionWeeks: 计划总周数
#   - trainingSchedule: 每周训练日 (MONDAY~SUNDAY)
#   - lsdSchedule: 长距离跑安排日
#   - age: 年龄
#   - trainingHistory: 历史训练数据
#   - intensity: 训练强度 (high/medium/low)
# ============================================================

# ------ 正向用例 ------

- case_id: "plan_gen_001"
  title: "正常生成计划 - 半马目标_男性_中等强度"
  data:
    gender: 1
    heightValue: "175"
    heightUnit: "cm"
    weightValue: "70"
    weightUnit: "kg"
    trainingGoal: "half_marathon"
    planCompletionWeeks: 12
    trainingSchedule:
      - "MONDAY"
      - "WEDNESDAY"
      - "FRIDAY"
      - "SATURDAY"
      - "SUNDAY"
    lsdSchedule: "SUNDAY"
    age: 28
    intensity: "medium"
    trainingHistory:
      paceDTO:
        pace5km: "5'30\""
        pace10km: "5'45\""
      heartRateDTO:
        heartRate: 160
      fiveKm:
        pace: "5'30\""
        heartRate: "160"
  expected:
    status_code: 200
    code: 0

