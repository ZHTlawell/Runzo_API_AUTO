    gender: 1
    heightValue: "175"
    heightUnit: "cm"
    weightValue: "70"
    weightUnit: "kg"
    # trainingGoal 故意缺失
    planCompletionWeeks: 12
    trainingSchedule:
      - "MONDAY"
      - "WEDNESDAY"
