# 创建订单测试数据
- case_id: "order_001"
  title: "正常创建订单"
  data:
    product_id: "PROD_001"
    quantity: 2
  expected:
    status_code: 200
    json_path: "$.code"
    value: 0

- case_id: "order_002"
  title: "创建订单失败 - 商品ID为空"
  data:
    product_id: ""
    quantity: 1
  expected:
    status_code: 400
    json_path: "$.code"
    value: -1

- case_id: "order_003"
  title: "创建订单失败 - 数量为0"
  data:
    product_id: "PROD_001"
    quantity: 0
  expected:
    status_code: 400
    json_path: "$.code"
    value: -1
