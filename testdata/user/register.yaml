# 用户注册测试数据
- case_id: "register_001"
  title: "正常注册 - 有效用户名、密码、邮箱"
  data:
    username: "auto_test_user01"
    password: "Test@12345"
    email: "autotest01@example.com"
  expected:
    status_code: 200
    json_path: "$.code"
    value: 0

- case_id: "register_002"
  title: "注册失败 - 用户名为空"
  data:
    username: ""
    password: "Test@12345"
    email: "autotest02@example.com"
  expected:
    status_code: 400
    json_path: "$.code"
    value: -1

- case_id: "register_003"
  title: "注册失败 - 密码长度不足"
  data:
    username: "auto_test_user03"
    password: "123"
    email: "autotest03@example.com"
  expected:
    status_code: 400
    json_path: "$.code"
    value: -1

- case_id: "register_004"
  title: "注册失败 - 邮箱格式错误"
  data:
    username: "auto_test_user04"
    password: "Test@12345"
    email: "invalid-email"
  expected:
    status_code: 400
    json_path: "$.code"
    value: -1
