[pytest]
# 默认参数
addopts = -v -s --tb=short --strict-markers

# 测试文件搜索路径
testpaths = testcases

# 测试文件命名规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 自定义标记
markers =
    smoke: 冒烟测试
    regression: 回归测试
    p0: 最高优先级
    p1: 高优先级
    p2: 中优先级
    p3: 低优先级
    performance: 性能相关用例

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
