# Locust 性能测试配置
# 使用方式: locust -f performance/locustfile.py --config=performance/performance_config.yaml

# 目标主机
host: "http://test-api.example.com"

# 并发用户数
users: 100

# 每秒生成用户数
spawn-rate: 10

# 运行时长
run-time: "5m"

# 无头模式（不启动 Web UI）
# headless: true

# 输出 HTML 报告
# html: "reports/performance_report.html"
